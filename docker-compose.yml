services:
  api:
    build: .
    depends_on:
      - redis
    environment:
      PORT: 3000
      WEATHER_API_KEY: M6UDSMETPNEPTEUZ4YUC69LNZ
      REDIS_URL: redis://redis:6379
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:8.6.3-alpine3.23
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - api
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge

